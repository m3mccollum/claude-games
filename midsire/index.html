<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Midsire - Civilization Prototype</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
    <div id="app">
        <header id="topbar">
            <h1>Midsire</h1>
            <div id="currency">
                <span class="label">Coins:</span>
                <span id="currency-amount">0</span>
            </div>
        </header>
        <main id="main">
            <div id="game-container"></div>
            <aside id="shop">
                <section class="panel">
                    <h2>Tools</h2>
                    <div id="tools">
                        <button id="tool-demolish" class="tool-btn" type="button">
                            <span class="tool-icon">&times;</span>
                            <span class="tool-label">Demolish</span>
                        </button>
                    </div>
                    <p class="hint" id="tool-hint">Click a tool to activate it. Press Esc to cancel.</p>
                </section>
                <section class="panel">
                    <h2>Shop</h2>
                    <p class="hint">Drag a building onto the grid to place it.</p>
                    <div id="shop-items"></div>
                </section>
            </aside>
        </main>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>
